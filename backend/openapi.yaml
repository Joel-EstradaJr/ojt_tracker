openapi: 3.0.3
info:
  title: OJT Tracker Backend API
  version: 1.0.0
  description: |
    OpenAPI specification for the OJT Tracker backend. This spec powers Swagger UI
    at /docs and Redoc at /redoc.
servers:
  - url: http://localhost:4000
    description: Local development

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ojt_session
      description: HttpOnly session cookie issued by /api/auth/login.

  parameters:
    InternalKeyHeader:
      name: x-internal-key
      in: header
      required: false
      schema:
        type: string
      description: Internal key used by server-side callers to receive debug-only fields.
    SuperPasswordHeader:
      name: x-super-password
      in: header
      required: true
      schema:
        type: string
      description: SHA-256 hash of SUPER_PASSWORD.

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
      example:
        error: Authentication required.

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
      example:
        message: Done.

    WorkScheduleEntry:
      type: object
      properties:
        start:
          type: string
          example: "08:00"
        end:
          type: string
          example: "17:00"
      required: [start, end]

    Supervisor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        traineeId:
          type: string
          format: uuid
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        suffix:
          type: string
          nullable: true
        contactNumber:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: "c2f1b8c0-7f0f-4db2-a9dd-2c1e4012f8b2"
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        lastName: "DOE"
        firstName: "JANE"
        middleName: "A"
        suffix: "JR"
        contactNumber: "+639171234567"
        email: "supervisor@example.com"
        displayName: "JANE A DOE JR"
        createdAt: "2026-04-01T08:00:00.000Z"
        updatedAt: "2026-04-01T08:00:00.000Z"

    Trainee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, trainee]
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        suffix:
          type: string
          nullable: true
        email:
          type: string
          format: email
        pendingEmail:
          type: string
          nullable: true
        pendingEmailRequestedAt:
          type: string
          format: date-time
          nullable: true
        pendingEmailExpiresAt:
          type: string
          format: date-time
          nullable: true
        emailVerificationStatus:
          type: string
          enum: [verified, pending, expired]
        contactNumber:
          type: string
        school:
          type: string
        companyName:
          type: string
        requiredHours:
          type: integer
        workSchedule:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WorkScheduleEntry"
        mustChangePassword:
          type: boolean
        lockedUntil:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        displayName:
          type: string
        totalHoursRendered:
          type: number
        supervisors:
          type: array
          items:
            $ref: "#/components/schemas/Supervisor"
      example:
        id: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        role: trainee
        lastName: "DOE"
        firstName: "JANE"
        middleName: "A"
        suffix: "JR"
        email: "jane@example.com"
        pendingEmail: null
        pendingEmailRequestedAt: null
        pendingEmailExpiresAt: null
        emailVerificationStatus: verified
        contactNumber: "+639171234567"
        school: "SAMPLE UNIVERSITY"
        companyName: "SAMPLE COMPANY"
        requiredHours: 240
        workSchedule:
          "1": { start: "08:00", end: "17:00" }
        mustChangePassword: false
        lockedUntil: null
        createdAt: "2026-04-01T08:00:00.000Z"
        updatedAt: "2026-04-01T08:00:00.000Z"
        displayName: "JANE A DOE JR"
        totalHoursRendered: 120
        supervisors: []

    TraineeWithTempPassword:
      allOf:
        - $ref: "#/components/schemas/Trainee"
        - type: object
          properties:
            _tempPassword:
              type: string
            _tempEmail:
              type: string
            _tempDisplayName:
              type: string
      example:
        id: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        role: trainee
        lastName: "DOE"
        firstName: "JANE"
        middleName: "A"
        suffix: "JR"
        email: "jane@example.com"
        pendingEmail: null
        pendingEmailRequestedAt: null
        pendingEmailExpiresAt: null
        emailVerificationStatus: verified
        contactNumber: "+639171234567"
        school: "SAMPLE UNIVERSITY"
        companyName: "SAMPLE COMPANY"
        requiredHours: 240
        workSchedule: {}
        mustChangePassword: true
        lockedUntil: null
        createdAt: "2026-04-01T08:00:00.000Z"
        updatedAt: "2026-04-01T08:00:00.000Z"
        displayName: "JANE A DOE JR"
        totalHoursRendered: 0
        supervisors: []
        _tempPassword: "TempPass123!"
        _tempEmail: "jane@example.com"
        _tempDisplayName: "JANE A DOE"

    LogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        traineeId:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        timeIn:
          type: string
          format: date-time
        lunchStart:
          type: string
          format: date-time
        lunchEnd:
          type: string
          format: date-time
        timeOut:
          type: string
          format: date-time
          nullable: true
        hoursWorked:
          type: number
        overtime:
          type: number
        offsetUsed:
          type: number
        accomplishment:
          type: string
          nullable: true
        faceVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: "b2f50d6e-4908-4f5c-a616-1b43c9e5a21f"
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        date: "2026-04-20T00:00:00.000Z"
        timeIn: "2026-04-20T08:00:00.000Z"
        lunchStart: "2026-04-20T12:00:00.000Z"
        lunchEnd: "2026-04-20T13:00:00.000Z"
        timeOut: "2026-04-20T17:00:00.000Z"
        hoursWorked: 480
        overtime: 0
        offsetUsed: 0
        accomplishment: "Worked on onboarding tasks."
        faceVerified: true
        createdAt: "2026-04-20T17:01:00.000Z"
        updatedAt: "2026-04-20T17:01:00.000Z"

    Settings:
      type: object
      properties:
        id:
          type: string
        countEarlyInAsOT:
          type: boolean
        countLateOutAsOT:
          type: boolean
        countEarlyLunchEndAsOT:
          type: boolean
      example:
        id: default
        countEarlyInAsOT: false
        countLateOutAsOT: true
        countEarlyLunchEndAsOT: false

    Script:
      type: object
      properties:
        id:
          type: string
          format: uuid
        traineeId:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: "55c8b64c-5a39-4d5c-9a6c-0a8f16a2f3d3"
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        title: "Daily Summary"
        content: "Completed module testing and updated documentation."
        createdAt: "2026-04-20T09:00:00.000Z"
        updatedAt: "2026-04-20T09:00:00.000Z"

    AuthLoginResponse:
      type: object
      properties:
        message:
          type: string
        role:
          type: string
          enum: [admin, trainee]
        traineeId:
          type: string
          format: uuid
          nullable: true
        mustChangePassword:
          type: boolean
        hasPendingEmailChange:
          type: boolean
        requiresPendingEmailVerification:
          type: boolean
        pendingEmail:
          type: string
          nullable: true
        pendingEmailExpiresAt:
          type: string
          format: date-time
          nullable: true
        pendingEmailVerifyAttempts:
          type: integer
        pendingEmailAttemptsRemaining:
          type: integer
        pendingEmailAdminResendRequired:
          type: boolean
        pendingEmailStatus:
          type: string
          enum: [verified, pending, expired]
      example:
        message: Logged in.
        role: trainee
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        mustChangePassword: false
        hasPendingEmailChange: false
        requiresPendingEmailVerification: false
        pendingEmail: null
        pendingEmailExpiresAt: null
        pendingEmailVerifyAttempts: 0
        pendingEmailAttemptsRemaining: 3
        pendingEmailAdminResendRequired: false
        pendingEmailStatus: verified

    AuthMeResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        role:
          type: string
          enum: [admin, trainee]
          nullable: true
        traineeId:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: integer
          nullable: true
        hasPendingEmailChange:
          type: boolean
        requiresPendingEmailVerification:
          type: boolean
        pendingEmail:
          type: string
          nullable: true
        pendingEmailExpiresAt:
          type: string
          format: date-time
          nullable: true
        pendingEmailVerifyAttempts:
          type: integer
        pendingEmailAttemptsRemaining:
          type: integer
        pendingEmailAdminResendRequired:
          type: boolean
        pendingEmailStatus:
          type: string
          enum: [verified, pending, expired]
        currentUser:
          type: object
          properties:
            id:
              type: string
              nullable: true
            displayName:
              type: string
            email:
              type: string
              nullable: true
            isSuper:
              type: boolean
            faceEnabled:
              type: boolean
            faceAttendanceEnabled:
              type: boolean
            faceEnrolledAt:
              type: string
              format: date-time
              nullable: true
      example:
        authenticated: true
        role: trainee
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        expiresAt: 1893456000000
        hasPendingEmailChange: false
        requiresPendingEmailVerification: false
        pendingEmail: null
        pendingEmailExpiresAt: null
        pendingEmailVerifyAttempts: 0
        pendingEmailAttemptsRemaining: 3
        pendingEmailAdminResendRequired: false
        pendingEmailStatus: verified
        currentUser:
          id: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
          displayName: "JANE A DOE JR"
          email: "jane@example.com"
          isSuper: false
          faceEnabled: true
          faceAttendanceEnabled: true
          faceEnrolledAt: "2026-04-01T08:00:00.000Z"

    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
        fullName:
          type: string
        password:
          type: string
      required: [password]
      example:
        identifier: "jane.doe@example.com"
        password: "hashed-or-raw-password"

    FaceLoginRequest:
      type: object
      properties:
        identifier:
          type: string
        imageBase64:
          type: string
      required: [identifier, imageBase64]
      example:
        identifier: "jane.doe@example.com"
        imageBase64: "base64string"

    ForgotPasswordRequest:
      type: object
      properties:
        fullName:
          type: string
      required: [fullName]
      example:
        fullName: "Jane A Doe"

    VerifyResetCodeRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]
      example:
        code: "123456"

    ResetPasswordRequest:
      type: object
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
        confirmPassword:
          type: string
      required: [resetToken, newPassword]
      example:
        resetToken: "8ac0df5d-2ef7-4dbb-b7a4-0f8e9e48f3b4"
        newPassword: "new-password"
        confirmPassword: "new-password"

    SetInitialPasswordRequest:
      type: object
      properties:
        traineeId:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string
        confirmPassword:
          type: string
      required: [traineeId, currentPassword, newPassword, confirmPassword]
      example:
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        currentPassword: "temp-password"
        newPassword: "new-password"
        confirmPassword: "new-password"

    TraineeCreateRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, trainee]
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        suffix:
          type: string
        email:
          type: string
          format: email
        contactNumber:
          type: string
        school:
          type: string
        companyName:
          type: string
        requiredHours:
          type: integer
        workSchedule:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WorkScheduleEntry"
        password:
          type: string
        supervisors:
          type: array
          items:
            $ref: "#/components/schemas/SupervisorRequest"
        verificationToken:
          type: string
        faceImageBase64:
          type: string
      required: [lastName, firstName, email, contactNumber, school, companyName, requiredHours]
      example:
        lastName: "DOE"
        firstName: "JANE"
        email: "jane@example.com"
        contactNumber: "+639171234567"
        school: "SAMPLE UNIVERSITY"
        companyName: "SAMPLE COMPANY"
        requiredHours: 240

    TraineeUpdateRequest:
      type: object
      properties:
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        suffix:
          type: string
        email:
          type: string
          format: email
        contactNumber:
          type: string
        school:
          type: string
        companyName:
          type: string
        requiredHours:
          type: integer
        workSchedule:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WorkScheduleEntry"
        verificationToken:
          type: string
      required: [lastName, firstName, email, contactNumber, school, companyName, requiredHours]
      example:
        lastName: "DOE"
        firstName: "JANE"
        email: "jane@example.com"
        contactNumber: "+639171234567"
        school: "SAMPLE UNIVERSITY"
        companyName: "SAMPLE COMPANY"
        requiredHours: 240

    TraineeVerifyPasswordRequest:
      type: object
      properties:
        password:
          type: string
      required: [password]
      example:
        password: "hashed-or-raw-password"

    ResendTempPasswordResponse:
      type: object
      properties:
        message:
          type: string
        _tempPassword:
          type: string
        _tempEmail:
          type: string
        _tempDisplayName:
          type: string
      example:
        message: Temporary password regenerated.
        _tempPassword: "TempPass123!"
        _tempEmail: "jane@example.com"
        _tempDisplayName: "JANE A DOE"

    SupervisorRequest:
      type: object
      properties:
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        suffix:
          type: string
        contactNumber:
          type: string
        email:
          type: string
      required: [lastName, firstName]
      example:
        lastName: "SMITH"
        firstName: "ANNA"
        contactNumber: "+639171111111"
        email: "anna.smith@example.com"

    LogCreateRequest:
      type: object
      properties:
        traineeId:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        timeIn:
          type: string
          format: date-time
        timeOut:
          type: string
          format: date-time
        lunchStart:
          type: string
          format: date-time
        lunchEnd:
          type: string
          format: date-time
        accomplishment:
          type: string
        applyOffset:
          type: boolean
        offsetAmount:
          type: number
        faceImageBase64:
          type: string
      required: [traineeId, date, timeIn]
      example:
        traineeId: "25a0f5f7-7ad9-49f9-9a2a-9c4b6c1f2c55"
        date: "2026-04-20T00:00:00.000Z"
        timeIn: "2026-04-20T08:00:00.000Z"
        timeOut: "2026-04-20T17:00:00.000Z"
        lunchStart: "2026-04-20T12:00:00.000Z"
        lunchEnd: "2026-04-20T13:00:00.000Z"
        accomplishment: "Worked on onboarding tasks."

    LogUpdateRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
        timeIn:
          type: string
          format: date-time
        timeOut:
          type: string
          format: date-time
        lunchStart:
          type: string
          format: date-time
        lunchEnd:
          type: string
          format: date-time
        accomplishment:
          type: string
        applyOffset:
          type: boolean
        offsetAmount:
          type: number
      example:
        accomplishment: "Updated accomplishment text."
        applyOffset: true
        offsetAmount: 60

    LogActionRequest:
      type: object
      properties:
        action:
          type: string
          enum: [lunchStart, lunchEnd, timeOut, accomplishment, offset]
        timestamp:
          type: string
          format: date-time
        accomplishment:
          type: string
        offsetMinutes:
          type: integer
        faceImageBase64:
          type: string
      required: [action]
      example:
        action: timeOut
        timestamp: "2026-04-20T17:00:00.000Z"
        faceImageBase64: "base64string"

    EmailSendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
      example:
        email: "jane@example.com"

    EmailVerifyCodeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
      required: [email, code]
      example:
        email: "jane@example.com"
        code: "123456"

    SettingsUpdateRequest:
      type: object
      properties:
        countEarlyInAsOT:
          type: boolean
        countLateOutAsOT:
          type: boolean
        countEarlyLunchEndAsOT:
          type: boolean
      example:
        countEarlyInAsOT: false
        countLateOutAsOT: true
        countEarlyLunchEndAsOT: false

    ScriptCreateRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required: [title, content]
      example:
        title: "Daily Summary"
        content: "Completed module testing and updated documentation."

    ScriptUpdateRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required: [title, content]
      example:
        title: "Revised Summary"
        content: "Added new details."

    BackupVerifyRequest:
      type: object
      properties:
        password:
          type: string
      required: [password]
      example:
        password: "sha256hash"

    BackupImportResponse:
      type: object
      properties:
        message:
          type: string
        dryRun:
          type: boolean
        summary:
          type: object
          properties:
            imported:
              type: integer
            skipped:
              type: integer
            failed:
              type: integer
        byTable:
          type: object
        failures:
          type: array
          items:
            type: object
            properties:
              table:
                type: string
              reason:
                type: string
              row:
                type: integer
        trainees:
          type: integer
        supervisors:
          type: integer
        logs:
          type: integer
        skipped:
          type: integer
      example:
        message: "Import completed."
        dryRun: false
        summary:
          imported: 10
          skipped: 2
          failed: 0
        byTable: {}
        failures: []
        trainees: 5
        supervisors: 3
        logs: 2
        skipped: 2

    ImportCsvResponse:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        skippedDetails:
          type: array
          items:
            type: string
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
      example:
        imported: 5
        skipped: 1
        skippedDetails: ["Duplicate date 2026-04-20"]
        logs: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Simple health check endpoint.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              example:
                status: ok

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with password
      description: Logs in by full name or email and sets the session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          headers:
            Set-Cookie:
              description: HttpOnly session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/face-login:
    post:
      tags: [Auth]
      summary: Login with face recognition
      description: Logs in using face verification and sets the session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaceLoginRequest"
      responses:
        "200":
          description: Logged in
          headers:
            Set-Cookie:
              description: HttpOnly session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Face login disabled for this account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Face recognition not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/forgot-password/request-code:
    post:
      tags: [Auth]
      summary: Request password reset code
      description: Sends a verification code to the trainee email for password reset.
      parameters:
        - $ref: "#/components/parameters/InternalKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Code generated
