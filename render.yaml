# Render Blueprint
# Backend: Render (Node/Express)
# Database: Supabase (PostgreSQL)
# Frontend remains on Vercel (configure BACKEND_URL in Vercel env)

services:
  - type: web
    name: ojt-tracker-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FACE_ENGINE
        value: openface-cli
      - key: OPENFACE_CLI_PATH
        value: /opt/openface/build/bin/FeatureExtraction
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
