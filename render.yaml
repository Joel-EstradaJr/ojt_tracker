# Render Blueprint
# Backend: Render (Node/Express)
# Database: Supabase (PostgreSQL)
# Frontend remains on Vercel (configure BACKEND_URL in Vercel env)

services:
  - type: web
    name: ojt-tracker-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FACE_ENGINE
        value: openface-cli
